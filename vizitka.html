<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Antonin Todorov — Vitosha Photo Center</title>
<style>
  :root{
    --accent1:#7c5cff;
    --accent2:#22b8cf;
    --gold1:#a87a16;
    --gold2:#f3d27a;
    --gold3:#fff6da;
    --r:24px;
  }
  [data-theme="dark"]{
    --bg:#06070b;
    --glow1:rgba(124,92,255,.20);
    --glow2:rgba(243,210,122,.16);
    --card:linear-gradient(165deg,rgba(26,27,38,.78),rgba(10,11,16,.92));
    --border:rgba(255,255,255,.09);
    --tile:rgba(255,255,255,.045);
    --text:#f4f5f7;
    --muted:#9aa3b2;
    --logo-grad:linear-gradient(105deg,var(--gold1),var(--gold2),var(--gold3),var(--gold2),var(--gold1));
    --name-grad:linear-gradient(105deg,var(--gold1),var(--gold2),var(--gold3),var(--gold2),var(--gold1));
  }
  [data-theme="light"]{
    --bg:#e9edf4;
    --glow1:rgba(124,92,255,.16);
    --glow2:rgba(168,122,22,.14);
    --card:linear-gradient(165deg,rgba(255,255,255,.96),rgba(244,247,252,.99));
    --border:rgba(12,18,32,.10);
    --tile:rgba(12,22,44,.045);
    --text:#181b22;
    --muted:#5c6675;
    --logo-grad:linear-gradient(105deg,#1d3a5f,#2f5d93,#5b8fce,#2f5d93,#1d3a5f);
    --name-grad:linear-gradient(105deg,#8a5e0a,#caa12e,#f0cf73,#caa12e,#8a5e0a);
  }

  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--text);
    display:flex;align-items:center;justify-content:center;min-height:100vh;
    padding:18px;overflow-x:hidden;position:relative;transition:background .45s ease,color .45s ease;
  }
  body::before,body::after{content:"";position:fixed;border-radius:50%;filter:blur(130px);z-index:0;animation:float 16s ease-in-out infinite}
  body::before{width:460px;height:460px;background:var(--glow1);top:-160px;left:-140px}
  body::after{width:420px;height:420px;background:var(--glow2);bottom:-160px;right:-140px;animation-delay:-8s}
  @keyframes float{0%,100%{transform:translate(0,0)}50%{transform:translate(46px,34px)}}

  .card{
    position:relative;z-index:1;width:100%;max-width:404px;
    background:var(--card);border:1px solid var(--border);border-radius:var(--r);
    padding:16px 26px 22px;text-align:center;backdrop-filter:blur(14px) saturate(1.1);
    box-shadow:0 36px 70px -28px rgba(0,0,0,.6),0 1px 0 rgba(255,255,255,.05) inset;
    transition:background .45s ease,border-color .45s ease;
  }

  .topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px}
  .langs{display:flex;gap:2px;background:var(--tile);border:1px solid var(--border);border-radius:999px;padding:3px}
  .langs button{
    border:0;background:transparent;color:var(--muted);font-size:11.5px;font-weight:700;
    letter-spacing:.6px;padding:6px 11px;border-radius:999px;cursor:pointer;transition:.2s;
  }
  .langs button:hover{color:var(--text)}
  .langs button.active{color:#1a1205;background:linear-gradient(135deg,var(--gold2),var(--gold3));box-shadow:0 3px 10px -3px var(--gold1)}
  .theme-toggle{
    width:38px;height:38px;flex:0 0 auto;border-radius:50%;cursor:pointer;
    border:1px solid var(--border);background:var(--tile);color:var(--text);
    display:flex;align-items:center;justify-content:center;transition:.25s;
  }
  .theme-toggle:hover{transform:rotate(18deg);color:var(--gold2)}
  .theme-toggle svg{width:18px;height:18px}
  [data-theme="dark"] .theme-toggle .i-sun{display:block}
  [data-theme="dark"] .theme-toggle .i-moon{display:none}
  [data-theme="light"] .theme-toggle .i-sun{display:none}
  [data-theme="light"] .theme-toggle .i-moon{display:block}

  /* Горна част: текст вляво, овал вдясно */
  .hero{display:flex;gap:14px;align-items:stretch;text-align:left;min-height:190px;margin:2px 0 4px}
  .hero-left{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:flex-start}
  .idtext{margin:auto 0 14px}
  .hero-right{flex:0 0 138px;display:flex}

  .brand{display:flex;flex-direction:column;align-items:flex-start;margin:0 0 2px;padding-left:2px}
  .brand .logo{
    width:82px;max-width:100%;
    background:var(--logo-grad);background-size:230% auto;
    -webkit-mask:var(--logo) center/contain no-repeat;mask:var(--logo) center/contain no-repeat;
    -webkit-mask-mode:alpha;mask-mode:alpha;
    animation:shimmerGold 6s linear infinite;
    filter:drop-shadow(0 3px 8px rgba(168,122,22,.16));
  }
  .brand .logo-text{
    font-family:Georgia,"Times New Roman",serif;font-style:italic;font-size:26px;font-weight:700;
    background:var(--logo-grad);background-size:230% auto;-webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;animation:shimmerGold 6s linear infinite;
  }
  .brand .logo-sub{font-family:Georgia,serif;font-style:italic;color:var(--muted);font-size:13px;margin-top:-2px}
  @keyframes shimmerGold{to{background-position:230% center}}

  /* Аватар */
  .avatar{
    width:138px;height:100%;border-radius:50%;padding:3px;
    background:conic-gradient(from 210deg,#a87a16,#f3d27a,#fff6da,#caa12e,#a87a16,#f3d27a,#a87a16);
    box-shadow:0 0 26px rgba(168,122,22,.42);
  }
  .avatar .ring{width:100%;height:100%;border-radius:50%;overflow:hidden;background:var(--bg);display:flex;align-items:center;justify-content:center}
  .avatar img{width:100%;height:100%;object-fit:cover;object-position:center 18%;display:block}
  .avatar-fallback{width:100%;height:100%;align-items:center;justify-content:center;font-size:30px;font-weight:800;color:#fff;background:linear-gradient(135deg,var(--accent1),var(--accent2))}

  .name{
    font-family:Georgia,"Times New Roman",serif;font-size:clamp(24px,5.6vw,31px);font-weight:700;
    letter-spacing:.3px;line-height:1.08;
    background:var(--name-grad);background-size:230% auto;
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    filter:drop-shadow(0 2px 14px rgba(243,210,122,.42));
    animation:shimmerGold 6s linear infinite;
  }
  .roles{margin-top:8px;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);font-weight:600;line-height:1.5}
  .roles .dot{color:var(--gold2);margin:0 6px;font-size:8px;vertical-align:middle}

  .contacts{margin-top:12px;display:flex;flex-direction:column;gap:5px}
  .contact{display:flex;align-items:center;justify-content:center;gap:8px;font-size:15px}
  .contact a{color:var(--text);text-decoration:none;transition:color .2s;font-weight:600;letter-spacing:.4px}
  .contact a:hover{color:var(--gold2)}
  .copy-btn{
    border:1px solid var(--border);background:var(--tile);color:var(--muted);width:28px;height:28px;
    border-radius:8px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:.2s;
  }
  .copy-btn:hover{color:var(--text);transform:translateY(-2px)}
  .copy-btn svg{width:14px;height:14px}

  .socials{display:flex;justify-content:center;gap:12px;margin:16px 0 16px}
  .socials a{
    width:46px;height:46px;display:flex;align-items:center;justify-content:center;border-radius:13px;
    background:var(--tile);border:1px solid var(--border);color:var(--muted);
    transition:transform .25s ease,background .25s ease,color .25s ease,box-shadow .25s ease;
  }
  .socials a svg{width:21px;height:21px}
  .socials a:hover{transform:translateY(-5px);color:#fff;box-shadow:0 12px 22px -8px rgba(0,0,0,.5)}
  .socials a.ph:hover{background:linear-gradient(135deg,#16a34a,#22c55e)}
  .socials a.em:hover{background:linear-gradient(135deg,#e0a414,#f3d27a);color:#1a1205}
  .socials a.vb:hover{background:linear-gradient(135deg,#7360f2,#59267c)}
  .socials a.tg:hover{background:linear-gradient(135deg,#2aabee,#229ed9)}
  .socials a.wa:hover{background:linear-gradient(135deg,#25d366,#128c7e)}

  /* Долна секция: бутони + QR един до друг */
  .footer{display:flex;gap:16px;align-items:stretch;justify-content:center;margin-top:4px}
  .actions{flex:1;display:flex;flex-direction:column;gap:10px;justify-content:center;min-width:0}
  .btn{
    position:relative;display:inline-flex;align-items:center;justify-content:center;gap:9px;
    width:100%;padding:13px 16px;font-size:14.5px;font-weight:700;text-decoration:none;border:0;
    cursor:pointer;border-radius:14px;overflow:hidden;letter-spacing:.2px;white-space:nowrap;
    transition:transform .2s ease,box-shadow .3s ease,background .3s ease;
  }
  .btn.primary{color:#1a1205;background:linear-gradient(120deg,var(--gold1),var(--gold2),var(--gold3));background-size:200% auto;box-shadow:0 10px 26px -10px rgba(168,122,22,.7)}
  .btn.primary:hover{transform:translateY(-3px);background-position:right center;box-shadow:0 16px 34px -10px rgba(168,122,22,.85)}
  .btn.primary::after{content:"";position:absolute;top:0;left:-120%;width:55%;height:100%;background:linear-gradient(120deg,transparent,rgba(255,255,255,.6),transparent);transform:skewX(-20deg);animation:sweep 4s ease-in-out infinite}
  @keyframes sweep{0%{left:-120%}55%,100%{left:170%}}
  .btn.ghost{color:var(--text);background:var(--tile);border:1px solid var(--border)}
  .btn.ghost:hover{transform:translateY(-3px);background:var(--border)}
  .btn svg{width:18px;height:18px;position:relative;z-index:1;flex:0 0 auto}
  .btn span{position:relative;z-index:1;overflow:hidden;text-overflow:ellipsis}

  .qr{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:6px}
  .qr-card{background:#fff;padding:9px;border-radius:14px;box-shadow:0 14px 26px -14px rgba(0,0,0,.55)}
  .qr-card svg{width:104px;height:104px;display:block}
  .qr-hint{font-size:10px;color:var(--muted);letter-spacing:.3px;max-width:120px;line-height:1.3}

  .toast{
    position:fixed;left:50%;bottom:28px;transform:translate(-50%,28px);
    background:linear-gradient(135deg,var(--gold1),var(--gold2));color:#1a1205;
    padding:11px 22px;border-radius:999px;font-size:13.5px;font-weight:700;
    box-shadow:0 14px 30px -10px rgba(0,0,0,.5);opacity:0;pointer-events:none;
    transition:opacity .3s ease,transform .3s ease;z-index:50;
  }
  .toast.show{opacity:1;transform:translate(-50%,0)}

  @media (max-width:430px){
    .card{padding:18px 18px 22px}
    .footer{flex-direction:column;align-items:center;gap:14px}
    .actions{width:100%}
    .qr-card svg{width:120px;height:120px}
    .qr-hint{max-width:160px}
  }
</style>
</head>

        <svg class="i-moon" viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"/></svg>
